{% if messages %}
<div class="fixed top-24 left-1/2 -translate-x-1/2 z-[600] flex flex-col gap-3 w-full max-w-md pointer-events-none px-4" id="toast-container">
    {% for message in messages %}
        <div class="toast-message pointer-events-auto flex items-center gap-4 px-5 py-4 rounded-2xl shadow-ambient border transition-all duration-500 ease-out translate-y-[-1rem] opacity-0
            {% if message.tags == 'success' %}bg-[#E6F8F0] border-[#A6F2D1] text-[#004532]
            {% elif message.tags == 'error' %}bg-[#FFEBEE] border-[#FFDAD6] text-[#93000A]
            {% elif message.tags == 'warning' %}bg-[#FFF4E5] border-[#FFDCC3] text-[#663500]
            {% else %}bg-[#F2F6FC] border-[#DCE2F7] text-[#141B2B]{% endif %}" 
            role="alert" dir="rtl">
            
            <span class="material-symbols-outlined text-[24px] flex-shrink-0 
                {% if message.tags == 'success' %}text-[#004532]
                {% elif message.tags == 'error' %}text-[#ba1a1a]
                {% elif message.tags == 'warning' %}text-[#d97706]
                {% else %}text-[#353c4c]{% endif %}">
                {% if message.tags == 'success' %}check_circle
                {% elif message.tags == 'error' %}error
                {% elif message.tags == 'warning' %}warning
                {% else %}info{% endif %}
            </span>
            
            <div class="flex-grow font-body-md font-bold leading-tight">{{ message }}</div>
            
            <button type="button" class="flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full opacity-60 hover:opacity-100 hover:bg-black/5 transition-all" aria-label="إغلاق" onclick="this.closest('.toast-message').remove()">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>
    {% endfor %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const toasts = document.querySelectorAll('.toast-message');
        toasts.forEach((toast, index) => {
            setTimeout(() => {
                toast.classList.remove('translate-y-[-1rem]', 'opacity-0');
            }, index * 100 + 50);

            // Auto dismiss after 5 seconds
            setTimeout(() => {
                if (toast) {
                    toast.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => toast.remove(), 500);
                }
            }, 5000 + (index * 500));
        });
    });
</script>
{% endif %}
