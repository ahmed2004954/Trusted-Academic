{% if messages %}
<div class="toast-container" id="toast-container">
    {% for message in messages %}
        <div class="toast toast-{{ message.tags }}" role="alert">
            <span class="material-symbols-outlined toast-icon">
                {% if message.tags == 'success' %}check_circle{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}
            </span>
            <div class="toast-content">{{ message }}</div>
            <button type="button" class="toast-close" aria-label="إغلاق">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    {% endfor %}
</div>
{% endif %}
