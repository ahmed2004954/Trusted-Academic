<style>
    body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        background-color: #faf9f6;
        color: #1a1c1a;
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .icon-fill {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .ambient-shadow {
        box-shadow: 0 4px 24px -4px rgba(0, 69, 50, 0.04), 0 16px 48px -12px rgba(0, 69, 50, 0.08);
    }
    .hover-lift {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hover-lift:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(0, 69, 50, 0.08);
    }
    .nav-active {
        color: #004532;
        border-bottom: 2px solid #004532;
        padding-bottom: 0.25rem;
    }
    .status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
    [x-cloak] { display: none !important; }
</style>
