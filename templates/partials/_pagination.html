{% if page_obj.has_other_pages %}
<div class="flex justify-center mt-12 w-full">
    <nav class="flex items-center gap-3 bg-surface border border-outline-variant/50 px-4 py-2 rounded-2xl shadow-sm">
        {% if page_obj.has_previous %}
            <a href="?{% if query_string %}{{ query_string }}&{% endif %}page={{ page_obj.previous_page_number }}" class="w-10 h-10 flex items-center justify-center rounded-xl border border-outline-variant/70 text-on-surface-variant hover:bg-surface-container-low hover:text-primary transition-all">
                <span class="material-symbols-outlined text-[20px]">chevron_right</span>
            </a>
        {% endif %}
        <span class="font-label-md text-on-surface font-semibold px-3 text-sm">صفحة {{ page_obj.number }} من {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a href="?{% if query_string %}{{ query_string }}&{% endif %}page={{ page_obj.next_page_number }}" class="w-10 h-10 flex items-center justify-center rounded-xl border border-outline-variant/70 text-on-surface-variant hover:bg-surface-container-low hover:text-primary transition-all">
                <span class="material-symbols-outlined text-[20px]">chevron_left</span>
            </a>
        {% endif %}
    </nav>
</div>
{% endif %}
