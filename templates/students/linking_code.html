{% extends 'base.html' %}

{% block title %}كود ربط ولي الأمر - منصة الدروس الخصوصية{% endblock %}

{% block content %}
<section class="page-content">
    <h1>كود ربط ولي الأمر</h1>
    <div class="status-card">
        <p>شارك هذا الكود مع ولي الأمر لربط حسابه بحسابك.</p>
        <p><strong>الكود:</strong> {{ profile.linking_code }}</p>
    </div>
    <form method="post" class="inline-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">إنشاء كود جديد</button>
        <a class="btn btn-secondary" href="{% url 'students:dashboard' %}">رجوع</a>
    </form>
</section>
{% endblock %}
