{% extends 'base.html' %}

{% block title %}إعداد بروفايل المدرس - منصة الدروس الخصوصية{% endblock %}

{% block content %}
<section class="page-content auth-form">
    <h1>إعداد بروفايل المدرس</h1>
    <p>أكمل بياناتك المهنية ليتمكن فريق الإدارة من مراجعة طلبك.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">حفظ البروفايل</button>
        <a class="btn" href="{% url 'teachers:dashboard' %}">العودة للوحة المدرس</a>
    </form>
</section>
{% endblock %}
